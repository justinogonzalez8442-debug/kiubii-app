<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiubii — Sistema de Gestión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============================================================
       LOGIN SCREEN
       ============================================================ -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo-mark" style="width:48px;height:48px;font-size:26px;border-radius:12px">K</div>
        <span class="logo-text" style="font-size:22px;letter-spacing:3px">KIUBII</span>
      </div>
      <p class="login-subtitle">Sistema de Gestión Comercial</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input id="loginEmail" type="email" placeholder="admin@kiubii.mx" autocomplete="email" />
        </div>
        <div class="form-group" style="position:relative">
          <label>Contraseña</label>
          <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" id="togglePassBtn" onclick="togglePasswordVisibility()"
            style="position:absolute;right:10px;bottom:8px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3)">👁</button>
        </div>
        <div id="loginError" class="login-error hidden"></div>
        <button type="submit" id="loginBtn" class="btn btn-primary w-full" style="margin-top:8px;padding:12px;font-size:14px;justify-content:center">
          Ingresar
        </button>
      </form>

      <p class="login-footer">Kiubii &copy; 2026 · <span style="color:var(--text3)">Powered by Supabase</span></p>
    </div>
  </div>

  <!-- ============================================================
       APP SHELL (hidden until logged in)
       ============================================================ -->
  <div id="appShell" class="hidden" style="display:contents">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-mark">K</span>
          <span class="logo-text">KIUBII</span>
        </div>
        <button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-module="dashboard"   onclick="navigate('dashboard')">
          <span class="nav-icon">&#9632;</span><span class="nav-label">Dashboard</span>
        </a>
        <a class="nav-item" data-module="inventory"   onclick="navigate('inventory')">
          <span class="nav-icon">&#9651;</span><span class="nav-label">Inventario</span>
        </a>
        <a class="nav-item" data-module="sales"       onclick="navigate('sales')">
          <span class="nav-icon">&#9654;</span><span class="nav-label">Ventas</span>
        </a>
        <a class="nav-item" data-module="expenses"    onclick="navigate('expenses')">
          <span class="nav-icon">&#9660;</span><span class="nav-label">Gastos</span>
        </a>
        <a class="nav-item" data-module="receivables" onclick="navigate('receivables')">
          <span class="nav-icon">&#9671;</span><span class="nav-label">Cuentas x Cobrar</span>
        </a>
        <a class="nav-item" data-module="quotes"      onclick="navigate('quotes')">
          <span class="nav-icon">&#9633;</span><span class="nav-label">Cotizaciones</span>
        </a>
        <a class="nav-item" data-module="customers"   onclick="navigate('customers')">
          <span class="nav-icon">&#9679;</span><span class="nav-label">Clientes</span>
        </a>
        <a class="nav-item" data-module="compras"     onclick="navigate('compras')">
          <span class="nav-icon">&#9710;</span><span class="nav-label">Compras</span>
        </a>
        <a class="nav-item" data-module="users"       onclick="navigate('users')">
          <span class="nav-icon">&#9965;</span><span class="nav-label">Usuarios</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="topbarUserAvatar">K</div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name" id="topbarUserName">Usuario</span>
            <span class="role-badge" id="topbarRoleBadge">—</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="handleLogout()" title="Cerrar sesión" style="width:100%;justify-content:center;margin-top:8px">
          ⏻ Salir
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-icon" onclick="toggleSidebar()">&#9776;</button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <span class="date-display" id="dateDisplay"></span>
        </div>
      </header>

      <!-- Module containers -->
      <div class="module-container" id="mod-dashboard"></div>
      <div class="module-container hidden" id="mod-inventory"></div>
      <div class="module-container hidden" id="mod-sales"></div>
      <div class="module-container hidden" id="mod-expenses"></div>
      <div class="module-container hidden" id="mod-receivables"></div>
      <div class="module-container hidden" id="mod-quotes"></div>
      <div class="module-container hidden" id="mod-customers"></div>
      <div class="module-container hidden" id="mod-compras"></div>
      <div class="module-container hidden" id="mod-users"></div>
    </main>
  </div>

  <!-- Global Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="btn-icon" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Supabase CDN (must be first) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- App scripts (order matters) -->
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/receivables.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/customers.js"></script>
  <script src="js/compras.js"></script>
  <script src="js/users.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
